<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>접근 권한 없음</title>
    <style>
      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        color: #172033;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
        background: #f6f8fb;
      }
      section {
        width: min(440px, calc(100% - 40px));
        padding: 28px;
        border: 1px solid #d8dee8;
        border-radius: 8px;
        background: #fff;
        box-shadow: 0 18px 50px rgba(23, 32, 51, 0.1);
      }
      h1 { margin: 0 0 10px; font-size: 1.35rem; }
      p { margin: 0 0 20px; color: #667085; line-height: 1.6; }
      a {
        display: inline-flex;
        min-height: 42px;
        align-items: center;
        padding: 0 14px;
        border-radius: 8px;
        color: #fff;
        background: #172033;
        font-weight: 760;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <section>
      <h1>접근 권한이 없습니다</h1>
      <p>이 기능은 관리자 계정으로 로그인한 사용자만 사용할 수 있습니다.</p>
      <a href="{{ url_for('index') }}">메인으로 돌아가기</a>
    </section>
  </body>
</html>
