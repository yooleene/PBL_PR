{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-body">
                <h2 class="mb-4">기자 등록</h2>

                <form method="post">
                    <div class="mb-3">
                        <label for="name" class="form-label">이름</label>
                        <input type="text" class="form-control" id="name" name="name" required>
                    </div>

                    <div class="mb-3">
                        <label for="media_company" class="form-label">언론사</label>
                        <input type="text" class="form-control" id="media_company" name="media_company" required>
                    </div>

                    <div class="mb-3">
                        <label for="beat" class="form-label">출입 분야</label>
                        <input type="text" class="form-control" id="beat" name="beat" required>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">이메일</label>
                        <input type="email" class="form-control" id="email" name="email">
                    </div>

                    <div class="mb-3">
                        <label for="notes" class="form-label">메모</label>
                        <textarea class="form-control" id="notes" name="notes" rows="4"></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary">저장하기</button>
                    <a href="{{ url_for('reporter_list') }}" class="btn btn-secondary">취소</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
