<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>분석 중... | {{ keyword }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root{--bg:#0b1016;--sf:#111820;--sf2:#17212b;--bd:#2a3645;--tx:#eef3f8;--dim:#9aa8b8;--muted:#708092;--ac:#3b82f6;--ok:#22c7a9;--ng:#ef6f73;}
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Noto Sans KR',sans-serif;background:radial-gradient(circle at 50% -220px,rgba(59,130,246,.16),transparent 380px),var(--bg);color:var(--tx);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
        .c{max-width:540px;width:100%;text-align:center;}
        .badge{display:inline-flex;align-items:center;gap:7px;padding:6px 12px;background:rgba(34,199,169,.08);border:1px solid rgba(34,199,169,.26);border-radius:999px;font-size:12px;color:var(--ok);font-weight:800;margin-bottom:14px;}
        h1{font-size:23px;font-weight:900;margin-bottom:7px;letter-spacing:0;}
        .sub{font-size:14px;color:var(--dim);margin-bottom:34px;}
        .bar{width:100%;height:5px;background:var(--sf2);border-radius:999px;overflow:hidden;margin-bottom:24px;border:1px solid rgba(255,255,255,.03);}
        .fill{height:100%;background:linear-gradient(90deg,var(--ac),var(--ok));border-radius:999px;transition:width .6s;width:0%;}
        .panel{background:rgba(17,24,32,.96);border:1px solid var(--bd);border-radius:8px;padding:10px 22px 18px;box-shadow:0 18px 45px rgba(0,0,0,.2);}
        .steps{text-align:left;margin-bottom:22px;}
        .step{display:flex;align-items:flex-start;gap:14px;padding:15px 0;}
        .step+.step{border-top:1px solid rgba(255,255,255,.045);}
        .step-i{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;background:var(--sf2);border:1px solid var(--bd);color:var(--dim);transition:all .4s;font-weight:800;}
        .step.on .step-i{background:rgba(59,130,246,.13);border-color:var(--ac);color:#9fc4ff;animation:pulse 1.5s ease-in-out infinite;}
        .step.ok .step-i{background:rgba(34,199,169,.13);border-color:var(--ok);color:var(--ok);animation:none;}
        .step-t{font-size:14px;font-weight:800;color:var(--dim);padding-top:2px;transition:color .3s;}
        .step.on .step-t,.step.ok .step-t{color:var(--tx);}
        .step-m{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.6;}
        @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(59,130,246,.26)}50%{box-shadow:0 0 0 8px rgba(59,130,246,0)}}
        .msg{font-size:13px;color:var(--dim);min-height:22px;}
        .icon{width:15px;height:15px;stroke-width:2;}
        @media(max-width:640px){body{align-items:flex-start;padding-top:56px;}h1{font-size:21px}.panel{padding:8px 18px 16px;}}
    </style>
</head>
<body>
    <div class="c">
        <div class="badge"><i data-lucide="building-2" class="icon"></i>{{ company_name }}</div>
        <h1>'{{ keyword }}' 분석 중</h1>
        <p class="sub">수집과 맥락 검색이 끝나면 결과 화면으로 이동합니다</p>
        <div class="bar"><div class="fill" id="fill"></div></div>
        <div class="panel">
            <div class="steps">
                <div class="step" id="s1"><div class="step-i">1</div><div><div class="step-t">뉴스 기사 수집</div><div class="step-m">네이버 뉴스에서 기사 원문 크롤링</div></div></div>
                <div class="step" id="s2"><div class="step-i">2</div><div><div class="step-t">기사 원문 파싱</div><div class="step-m">본문 텍스트 추출 및 정리</div></div></div>
                <div class="step" id="s3"><div class="step-i">3</div><div><div class="step-t">내부 자료 + 트렌드 검색</div><div class="step-m">RAG 벡터DB + 네이버 데이터랩</div></div></div>
            </div>
            <div class="msg" id="msg">준비 중...</div>
        </div>
    </div>
    <script>
    if (window.lucide) lucide.createIcons();
    const taskId = "{{ task_id }}";
    function poll() {
        fetch('/status/' + taskId).then(r=>r.json()).then(data => {
            const step = data.step;
            document.getElementById('msg').textContent = data.msg;
            if (step === -1) { document.getElementById('msg').style.color = '#ef6f73'; return; }
            document.getElementById('fill').style.width = Math.min(step/3*100, 100) + '%';
            for (let i=1; i<=3; i++) {
                const el = document.getElementById('s'+i);
                el.classList.remove('on','ok');
                if (i < step) { el.classList.add('ok'); el.querySelector('.step-i').textContent = '✓'; }
                else if (i === step) { el.classList.add('on'); }
            }
            if (step >= 4) {
                document.getElementById('fill').style.width = '100%';
                [1,2,3].forEach(i => {
                    const el = document.getElementById('s'+i);
                    el.classList.remove('on'); el.classList.add('ok');
                    el.querySelector('.step-i').textContent = '✓';
                });
                document.getElementById('msg').textContent = '결과 화면으로 이동합니다...';
                setTimeout(() => { window.location.href = '/result/' + taskId; }, 600);
                return;
            }
            setTimeout(poll, 1000);
        }).catch(() => setTimeout(poll, 2000));
    }
    setTimeout(poll, 500);
    </script>
</body>
</html>
