<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ job.label }} 추출 중…</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('proj2.static', filename='css/app.css') }}" rel="stylesheet">
  </head>
  <body>
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">
          <div class="card shadow-sm border-0 text-center p-4 p-md-5">
            <div class="mb-4">
              <div class="spinner-border text-primary" role="status" style="width:3.5rem;height:3.5rem;">
                <span class="visually-hidden">Loading…</span>
              </div>
            </div>
            <h4 class="fw-bold mb-2">{{ job.label }} 추출 중</h4>
            <p class="text-muted mb-1">{{ job.started_on }} ~ {{ job.ended_on }} 기간 검색</p>
            <p class="text-muted small mb-4">Gemini 검색 grounding으로 수집 중입니다. 최대 수 분이 걸릴 수 있습니다. 이 페이지를 닫지 말고 기다려 주세요.</p>

            <div class="progress mb-3" style="height: 10px; border-radius: 6px;">
              <div class="progress-bar progress-bar-striped progress-bar-animated bg-primary"
                   role="progressbar" style="width: 100%"></div>
            </div>
            <div class="text-muted small mb-4">경과 시간: <span id="elapsed">0</span>초</div>

            <div class="alert alert-danger d-none text-start" id="errorAlert">
              <i class="bi bi-exclamation-triangle-fill me-2"></i>
              <span id="errorMessage"></span>
            </div>

            <a href="{{ url_for('proj2.index') }}" class="btn btn-sm btn-outline-secondary">목록으로 돌아가기</a>
          </div>
        </div>
      </div>
    </div>

    <script>
      const STATUS_URL = "{{ url_for('proj2.extract_status', job_id=job_id) }}";
      const RESULT_URL = "{{ url_for('proj2.extract_result', job_id=job_id) }}";
      const INDEX_URL = "{{ url_for('proj2.index') }}";
      const startedAt = Date.now();

      setInterval(function () {
        document.getElementById("elapsed").textContent =
          Math.floor((Date.now() - startedAt) / 1000);
      }, 1000);

      async function poll() {
        try {
          const res = await fetch(STATUS_URL, { headers: { Accept: "application/json" } });
          if (res.status === 404) {
            window.location.href = INDEX_URL;
            return;
          }
          const data = await res.json();
          if (data.status === "done" || data.status === "error") {
            window.location.href = RESULT_URL;
            return;
          }
        } catch (e) {
          /* 일시적 네트워크 오류는 무시하고 계속 폴링 */
        }
        setTimeout(poll, 2000);
      }
      setTimeout(poll, 1500);
    </script>
  </body>
</html>
