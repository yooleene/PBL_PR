<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>네이버 기자 기사 분석</title>
    <style>
      :root {
        --bg: linear-gradient(135deg, #f4efe7, #d8e8f0);
        --panel: rgba(255, 255, 255, 0.88);
        --text: #1f2a35;
        --accent: #14532d;
        --accent-2: #0f766e;
        --border: rgba(31, 42, 53, 0.12);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
        color: var(--text);
        background: var(--bg);
        min-height: 100vh;
      }
      .wrap { max-width: 920px; margin: 0 auto; padding: 48px 20px 64px; }
      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 24px;
        box-shadow: 0 24px 60px rgba(31, 42, 53, 0.08);
      }
      form { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
      label { display: block; font-size: 0.92rem; margin-bottom: 8px; }
      input {
        width: 100%; border: 1px solid var(--border); border-radius: 14px; padding: 13px 14px; font-size: 1rem;
      }
      .full { grid-column: 1 / -1; }
      button {
        border: 0; border-radius: 999px; padding: 14px 22px;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        color: white; font-size: 1rem; cursor: pointer;
      }
      .note, .error {
        margin-top: 16px; padding: 14px 16px; border-radius: 14px; font-size: 0.95rem; line-height: 1.6;
      }
      .note { background: rgba(20, 83, 45, 0.08); }
      .error { background: rgba(185, 28, 28, 0.1); color: #7f1d1d; }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="panel">
        <h1>네이버 기자 기사 분석 앱</h1>
        <p>검색, 기자 검증, 기자 페이지 수집, 포스코 기사/댓글 반응/LLM 분석까지 한 번에 수행하는 프로토타입이다.</p>
        <form method="post" action="/analyze">
          <div>
            <label for="office_name">언론사명</label>
            <input id="office_name" name="office_name" value="{{ form_data.office_name if form_data else '연합뉴스' }}" required>
          </div>
          <div>
            <label for="reporter_name">기자명</label>
            <input id="reporter_name" name="reporter_name" value="{{ form_data.reporter_name if form_data else '김지수' }}" required>
          </div>
          <div>
            <label for="date_from">조회 시작일</label>
            <input id="date_from" name="date_from" type="date" value="{{ form_data.date_from if form_data else '2026-03-01' }}" required>
          </div>
          <div>
            <label for="date_to">조회 종료일</label>
            <input id="date_to" name="date_to" type="date" value="{{ form_data.date_to if form_data else '2026-04-14' }}" required>
          </div>
          <div class="full">
            <label for="limit">최신 기사 수집 개수</label>
            <input id="limit" name="limit" type="number" min="1" max="100" value="{{ form_data.limit if form_data else '20' }}" required>
          </div>
          <div class="full">
            <button type="submit">분석 실행</button>
          </div>
        </form>
        <div class="note">
          운영 전 반드시 robots.txt, 이용약관, 저작권, 개인정보, 과도한 요청 방지 정책을 검토해야 한다.
        </div>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
      </section>
    </main>
  </body>
</html>
