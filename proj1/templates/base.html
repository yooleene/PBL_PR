<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}네이버 기자 분석기{% endblock %}</title>

  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" />
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" />
  <!-- Custom CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />

  {% block head %}{% endblock %}
</head>
<body>

<!-- 네비게이션 -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary-custom">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center gap-2" href="/">
      <i class="bi bi-newspaper fs-5"></i>
      <span class="fw-bold">기자 분석기</span>
      <span class="badge bg-warning text-dark ms-1 small">POSCO PR</span>
    </a>
    <div class="ms-auto d-flex align-items-center gap-2">
      <span class="text-white-50 small d-none d-md-inline">포스코 홍보팀 전용</span>
      <a href="/" class="btn btn-outline-light btn-sm">
        <i class="bi bi-search me-1"></i>새 검색
      </a>
    </div>
  </div>
</nav>

<!-- 메인 콘텐츠 -->
<main class="main-content">
  {% block content %}{% endblock %}
</main>

<!-- 푸터 -->
<footer class="footer mt-auto py-3 bg-light border-top">
  <div class="container text-center">
    <small class="text-muted">
      <i class="bi bi-shield-lock me-1"></i>
      포스코 홍보팀 내부 도구 &nbsp;|&nbsp; 네이버 뉴스 기반 기자 분석 시스템
    </small>
  </div>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
